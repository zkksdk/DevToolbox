<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevToolbox - Free Online Developer Tools</title>
<meta name="description" content="Free online developer tools: JSON formatter, Base64 encode/decode, JWT debugger, timestamp converter, QR generator, and more. No ads, no signup, works offline.">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --muted: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d2991d;
  --radius: 8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .sponsor{font-size:13px;color:var(--muted)}
header .sponsor a{color:var(--orange);text-decoration:none;font-weight:600}
header .sponsor a:hover{text-decoration:underline}
.layout{display:flex;height:calc(100vh - 57px)}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:12px 0;overflow-y:auto;flex-shrink:0}
.sidebar .cat{font-size:11px;text-transform:uppercase;color:var(--muted);padding:12px 16px 6px;font-weight:600;letter-spacing:0.5px}
.sidebar button{display:block;width:100%;text-align:left;padding:8px 16px;background:none;border:none;color:var(--text);font-size:14px;cursor:pointer;transition:background .15s;border-left:2px solid transparent}
.sidebar button:hover{background:rgba(88,166,255,0.06)}
.sidebar button.active{background:rgba(88,166,255,0.1);color:var(--accent);border-left-color:var(--accent)}
.sidebar .badge{font-size:10px;background:var(--accent);color:#000;padding:1px 6px;border-radius:10px;margin-left:6px;font-weight:700}
.main{flex:1;overflow-y:auto;padding:24px;max-width:900px}
.main h2{font-size:22px;margin-bottom:4px}
.main .desc{color:var(--muted);font-size:14px;margin-bottom:20px}
.tool-panel{display:none}
.tool-panel.active{display:block}
.io-row{display:flex;gap:16px;margin-bottom:16px}
.io-col{flex:1}
.io-col label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
textarea{width:100%;min-height:200px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Cascadia Code','Fira Code',Consolas,monospace;font-size:13px;resize:vertical;line-height:1.5}
textarea:focus{outline:none;border-color:var(--accent)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.btn{padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent)}
.btn-primary:hover{background:#79b8ff}
.btn-secondary{background:var(--surface);color:var(--text)}
.btn-secondary:hover{background:#21262d}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:rgba(248,81,73,0.1)}
.status{font-size:12px;padding:8px 12px;border-radius:var(--radius);margin-top:8px}
.status.ok{background:rgba(63,185,80,0.1);color:var(--green)}
.status.err{background:rgba(248,81,73,0.1);color:var(--red)}
input[type=text],input[type=number]{padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;width:100%}
input:focus{outline:none;border-color:var(--accent)}
.qr-result{text-align:center;margin-top:16px}
.qr-result canvas{border-radius:var(--radius);background:#fff;padding:12px}
.sponsor-banner{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid var(--orange);border-radius:var(--radius);padding:16px 20px;margin-top:24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.sponsor-banner p{font-size:14px;margin:0}
.sponsor-banner a{color:var(--orange);font-weight:700;text-decoration:none;white-space:nowrap}
.sponsor-banner a:hover{text-decoration:underline}
@media(max-width:768px){.layout{flex-direction:column}.sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);padding:8px;display:flex;overflow-x:auto;gap:4px}.sidebar .cat{display:none}.sidebar button{white-space:nowrap;font-size:12px;padding:6px 10px;border-left:none;border-bottom:2px solid transparent}.sidebar button.active{border-left:none;border-bottom-color:var(--accent)}.io-row{flex-direction:column}.main{padding:16px}}
footer{text-align:center;padding:16px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);margin-top:24px}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>

<header>
  <h1>🛠 DevToolbox</h1>
  <span class="sponsor">❤️ <a href="#sponsor">Support this project</a></span>
</header>

<div class="layout">
<nav class="sidebar">
  <div class="cat">Encoders</div>
  <button class="active" data-tool="json">JSON Formatter</button>
  <button data-tool="base64">Base64 Encode/Decode</button>
  <button data-tool="url">URL Encode/Decode</button>
  <button data-tool="jwt">JWT Debugger</button>
  <div class="cat">Generators</div>
  <button data-tool="qrcode">QR Code Generator</button>
  <button data-tool="password">Password Generator</button>
  <button data-tool="uuid">UUID Generator</button>
  <div class="cat">Converters</div>
  <button data-tool="timestamp">Timestamp Converter</button>
  <button data-tool="color">Color Converter</button>
  <button data-tool="markdown">Markdown Preview</button>
</nav>

<main class="main" id="main"></main>
</div>

<footer>
  DevToolbox &copy; 2026 · <a href="https://github.com" target="_blank">Open Source on GitHub</a> · Free forever, no ads
</footer>

<script>
// ---- Tool definitions ----
const tools = {
  json: {
    title: 'JSON Formatter',
    desc: 'Format, validate, and minify JSON.',
    render(h) {
      return `
        <div class="io-row">
          <div class="io-col"><label>Input</label><textarea id="json-in" placeholder='{"hello":"world"}'></textarea></div>
          <div class="io-col"><label>Output</label><textarea id="json-out" readonly></textarea></div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="tools.json.format()">Format</button>
          <button class="btn btn-secondary" onclick="tools.json.minify()">Minify</button>
          <button class="btn btn-secondary" onclick="tools.json.validate()">Validate</button>
          <button class="btn btn-danger" onclick="tools.json.clear()">Clear</button>
        </div>
        <div id="json-status"></div>
      `;
    },
    format(){ this._run(js => JSON.stringify(js, null, 2)); },
    minify(){ this._run(js => JSON.stringify(js)); },
    validate(){
      const out = document.getElementById('json-status');
      try{ JSON.parse(document.getElementById('json-in').value); out.innerHTML='<div class="status ok">Valid JSON</div>'; }
      catch(e){ out.innerHTML='<div class="status err">Invalid: ' + e.message + '</div>'; }
    },
    clear(){ document.getElementById('json-in').value=''; document.getElementById('json-out').value=''; document.getElementById('json-status').innerHTML=''; },
    _run(fn){
      const s = document.getElementById('json-status');
      try{ document.getElementById('json-out').value = fn(JSON.parse(document.getElementById('json-in').value)); s.innerHTML=''; }
      catch(e){ s.innerHTML='<div class="status err">Error: ' + e.message + '</div>'; }
    }
  },
  base64: {
    title: 'Base64 Encoder / Decoder',
    desc: 'Encode text to Base64 or decode Base64 back to text.',
    render(h) {
      return `
        <div class="io-row">
          <div class="io-col"><label>Text</label><textarea id="b64-text" placeholder="Enter text to encode..."></textarea></div>
          <div class="io-col"><label>Base64</label><textarea id="b64-out" placeholder="Or paste Base64 to decode..."></textarea></div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="tools.base64.encode()">Encode →</button>
          <button class="btn btn-primary" onclick="tools.base64.decode()">← Decode</button>
          <button class="btn btn-danger" onclick="tools.base64.clear()">Clear</button>
        </div>
        <div id="b64-status"></div>
      `;
    },
    encode(){
      try{
        document.getElementById('b64-out').value = btoa(unescape(encodeURIComponent(document.getElementById('b64-text').value)));
        document.getElementById('b64-status').innerHTML='';
      }catch(e){ document.getElementById('b64-status').innerHTML='<div class="status err">' + e.message + '</div>'; }
    },
    decode(){
      try{
        document.getElementById('b64-text').value = decodeURIComponent(escape(atob(document.getElementById('b64-out').value.trim())));
        document.getElementById('b64-status').innerHTML='';
      }catch(e){ document.getElementById('b64-status').innerHTML='<div class="status err">Invalid Base64</div>'; }
    },
    clear(){ document.getElementById('b64-text').value=''; document.getElementById('b64-out').value=''; document.getElementById('b64-status').innerHTML=''; }
  },
  url: {
    title: 'URL Encoder / Decoder',
    desc: 'Encode or decode URL-encoded strings.',
    render(h) {
      return `
        <div class="io-row">
          <div class="io-col"><label>Plain Text</label><textarea id="url-text" placeholder="Enter text or URL..."></textarea></div>
          <div class="io-col"><label>Encoded</label><textarea id="url-out" placeholder="Or paste encoded string..."></textarea></div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="tools.url.encode()">Encode →</button>
          <button class="btn btn-primary" onclick="tools.url.decode()">← Decode</button>
          <button class="btn btn-danger" onclick="tools.url.clear()">Clear</button>
        </div>
      `;
    },
    encode(){ document.getElementById('url-out').value = encodeURIComponent(document.getElementById('url-text').value); },
    decode(){ document.getElementById('url-text').value = decodeURIComponent(document.getElementById('url-out').value.trim()); },
    clear(){ document.getElementById('url-text').value=''; document.getElementById('url-out').value=''; }
  },
  jwt: {
    title: 'JWT Debugger',
    desc: 'Decode and inspect JWT tokens (header, payload, signature).',
    render(h) {
      return `
        <div class="io-col"><label>JWT Token</label><textarea id="jwt-in" placeholder="Paste your JWT token here... (eyJ...)" style="min-height:80px"></textarea></div>
        <div class="btn-row" style="margin-top:12px">
          <button class="btn btn-primary" onclick="tools.jwt.decode()">Decode</button>
          <button class="btn btn-danger" onclick="tools.jwt.clear()">Clear</button>
        </div>
        <div id="jwt-out" style="margin-top:12px"></div>
      `;
    },
    decode(){
      const parts = document.getElementById('jwt-in').value.trim().split('.');
      if(parts.length !== 3){ document.getElementById('jwt-out').innerHTML='<div class="status err">Invalid JWT (need 3 parts separated by dots)</div>'; return; }
      try{
        const header = JSON.parse(atob(parts[0]));
        const payload = JSON.parse(atob(parts[1]));
        document.getElementById('jwt-out').innerHTML = `
          <div class="io-row">
            <div class="io-col">
              <label>Header</label>
              <textarea readonly style="min-height:120px">${JSON.stringify(header, null, 2)}</textarea>
            </div>
            <div class="io-col">
              <label>Payload</label>
              <textarea readonly style="min-height:120px">${JSON.stringify(payload, null, 2)}</textarea>
            </div>
          </div>
          <div class="io-col"><label>Signature (Base64)</label><code style="word-break:break-all;font-size:12px;color:var(--muted)">${parts[2]}</code></div>
        `;
      }catch(e){ document.getElementById('jwt-out').innerHTML='<div class="status err">Decode failed: ' + e.message + '</div>'; }
    },
    clear(){ document.getElementById('jwt-in').value=''; document.getElementById('jwt-out').innerHTML=''; }
  },
  qrcode: {
    title: 'QR Code Generator',
    desc: 'Generate QR codes from text or URLs.',
    render(h) {
      // Lazy load qrcode library
      if(!window.QRCodeLib){
        const s = document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js';
        document.head.appendChild(s);
        window.QRCodeLib = true;
      }
      return `
        <div class="io-row">
          <div class="io-col">
            <label>Text / URL</label>
            <textarea id="qr-text" placeholder="Enter text or URL..." style="min-height:80px"></textarea>
            <div class="btn-row" style="margin-top:12px">
              <button class="btn btn-primary" onclick="tools.qrcode.gen()">Generate QR</button>
              <button class="btn btn-danger" onclick="tools.qrcode.clear()">Clear</button>
            </div>
          </div>
          <div class="io-col">
            <label>QR Code</label>
            <div class="qr-result" id="qr-result"></div>
          </div>
        </div>
      `;
    },
    gen(){
      const text = document.getElementById('qr-text').value;
      if(!text) return;
      const el = document.getElementById('qr-result');
      el.innerHTML = '';
      if(typeof QRCode !== 'undefined'){
        new QRCode(el, {text, width:200, height:200});
      } else {
        el.innerHTML = '<div class="status err">Loading QR library... please try again in a moment.</div>';
        setTimeout(() => tools.qrcode.gen(), 500);
      }
    },
    clear(){ document.getElementById('qr-text').value=''; document.getElementById('qr-result').innerHTML=''; }
  },
  password: {
    title: 'Password Generator',
    desc: 'Generate strong, random passwords.',
    render(h) {
      return `
        <div style="display:flex;gap:12px;align-items:end;flex-wrap:wrap;margin-bottom:16px">
          <div><label>Length</label><input type="number" id="pw-len" value="20" min="8" max="128" style="width:80px"></div>
          <div><label><input type="checkbox" id="pw-upper" checked> A-Z</label></div>
          <div><label><input type="checkbox" id="pw-lower" checked> a-z</label></div>
          <div><label><input type="checkbox" id="pw-digits" checked> 0-9</label></div>
          <div><label><input type="checkbox" id="pw-symbols" checked> !@#$</label></div>
          <button class="btn btn-primary" onclick="tools.password.gen()">Generate</button>
        </div>
        <div id="pw-result"></div>
      `;
    },
    gen(){
      const len = +document.getElementById('pw-len').value || 20;
      let chars = '';
      if(document.getElementById('pw-upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if(document.getElementById('pw-lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
      if(document.getElementById('pw-digits').checked) chars += '0123456789';
      if(document.getElementById('pw-symbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
      if(!chars){ document.getElementById('pw-result').innerHTML='<div class="status err">Select at least one character set</div>'; return; }
      const arr = new Uint32Array(len); crypto.getRandomValues(arr);
      let pw = '';
      for(let i=0;i<len;i++) pw += chars[arr[i] % chars.length];
      document.getElementById('pw-result').innerHTML = `
        <div class="status ok" style="font-family:monospace;font-size:18px;word-break:break-all">${pw}</div>
        <button class="btn btn-secondary" style="margin-top:8px" onclick="navigator.clipboard.writeText('${pw.replace(/'/g,"\\'")}')">Copy</button>
      `;
    }
  },
  uuid: {
    title: 'UUID Generator',
    desc: 'Generate random UUID v4 identifiers.',
    render(h) {
      return `
        <div class="btn-row">
          <button class="btn btn-primary" onclick="tools.uuid.gen()">Generate One</button>
          <button class="btn btn-secondary" onclick="tools.uuid.genMany()">Generate 10</button>
          <button class="btn btn-danger" onclick="tools.uuid.clear()">Clear</button>
        </div>
        <div id="uuid-result" style="margin-top:12px"></div>
      `;
    },
    gen(){
      const id = crypto.randomUUID();
      document.getElementById('uuid-result').innerHTML = `<div class="status ok" style="font-family:monospace;font-size:16px">${id}</div>`;
    },
    genMany(){
      let html = '';
      for(let i=0;i<10;i++) html += `<div style="font-family:monospace;font-size:14px;padding:4px 0;color:var(--green)">${crypto.randomUUID()}</div>`;
      document.getElementById('uuid-result').innerHTML = html;
    },
    clear(){ document.getElementById('uuid-result').innerHTML=''; }
  },
  timestamp: {
    title: 'Timestamp Converter',
    desc: 'Convert between Unix timestamps and human-readable dates.',
    render(h) {
      return `
        <div class="io-row">
          <div class="io-col">
            <label>Unix Timestamp (seconds)</label>
            <input type="text" id="ts-unix" placeholder="e.g. 1700000000">
            <button class="btn btn-primary" style="margin-top:8px" onclick="tools.timestamp.toDate()">→ Date</button>
          </div>
          <div class="io-col">
            <label>Human Date</label>
            <input type="text" id="ts-date" placeholder="e.g. 2024-01-01 00:00:00">
            <button class="btn btn-primary" style="margin-top:8px" onclick="tools.timestamp.toUnix()">→ Timestamp</button>
          </div>
        </div>
        <div style="margin-top:12px;color:var(--muted);font-size:13px">
          Current Unix timestamp: <code id="ts-now" style="color:var(--accent)"></code>
        </div>
      `;
    },
    toDate(){
      const ts = +document.getElementById('ts-unix').value;
      if(!ts) return;
      document.getElementById('ts-date').value = new Date(ts * 1000).toISOString().replace('T',' ').slice(0,19);
    },
    toUnix(){
      const d = new Date(document.getElementById('ts-date').value);
      if(isNaN(d.getTime())) return;
      document.getElementById('ts-unix').value = Math.floor(d.getTime() / 1000);
    },
    init(){ setInterval(()=>{ const el=document.getElementById('ts-now'); if(el) el.textContent = Math.floor(Date.now()/1000); }, 1000); }
  },
  color: {
    title: 'Color Converter',
    desc: 'Convert between HEX, RGB, and HSL color formats.',
    render(h) {
      return `
        <div class="io-row">
          <div class="io-col">
            <label>HEX</label>
            <input type="text" id="color-hex" placeholder="#58a6ff" maxlength="7">
          </div>
          <div class="io-col">
            <label>RGB</label>
            <input type="text" id="color-rgb" placeholder="rgb(88, 166, 255)">
          </div>
        </div>
        <div class="io-row" style="margin-top:8px">
          <div class="io-col">
            <label>Color Preview</label>
            <div id="color-preview" style="width:100%;height:100px;border-radius:var(--radius);background:#58a6ff;border:1px solid var(--border)"></div>
          </div>
        </div>
      `;
    },
    init(){
      const hexEl = document.getElementById('color-hex');
      const rgbEl = document.getElementById('color-rgb');
      const preview = document.getElementById('color-preview');
      if(!hexEl) return;
      hexEl.addEventListener('input', ()=>{
        const hex = hexEl.value;
        preview.style.background = hex;
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        if(!isNaN(r)) rgbEl.value = `rgb(${r}, ${g}, ${b})`;
      });
      rgbEl.addEventListener('input', ()=>{
        const m = rgbEl.value.match(/[\d.]+/g);
        if(m && m.length >= 3){
          const [r,g,b] = m.map(Number);
          preview.style.background = `rgb(${r},${g},${b})`;
          hexEl.value = '#' + [r,g,b].map(x=>Math.round(x).toString(16).padStart(2,'0')).join('');
        }
      });
    }
  },
  markdown: {
    title: 'Markdown Preview',
    desc: 'Write Markdown and see the rendered HTML preview.',
    render(h) {
      // Lazy load marked
      if(!window.MarkedLib){
        const s = document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js';
        document.head.appendChild(s);
        window.MarkedLib = true;
      }
      return `
        <div class="io-row">
          <div class="io-col">
            <label>Markdown</label>
            <textarea id="md-in" placeholder="# Hello World&#10;&#10;This is **markdown**." style="min-height:300px"></textarea>
          </div>
          <div class="io-col">
            <label>Preview</label>
            <div id="md-out" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;min-height:300px;overflow-y:auto;line-height:1.6"></div>
          </div>
        </div>
      `;
    },
    init(){
      const inp = document.getElementById('md-in');
      if(!inp) return;
      inp.addEventListener('input', ()=>{
        const out = document.getElementById('md-out');
        if(typeof marked !== 'undefined'){
          out.innerHTML = marked.parse(inp.value);
        }
      });
    }
  }
};

// ---- Router ----
const main = document.getElementById('main');
document.querySelectorAll('.sidebar button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tool = tools[btn.dataset.tool];
    main.innerHTML = `<h2>${tool.title}</h2><p class="desc">${tool.desc}</p><div class="tool-panel active">${tool.render(main)}</div>`;
    if(tool.init) setTimeout(tool.init, 100);
  });
});

// Load default tool
(function(){
  const tool = tools.json;
  main.innerHTML = `<h2>${tool.title}</h2><p class="desc">${tool.desc}</p><div class="tool-panel active">${tool.render(main)}</div>`;
})();

// Sponsor banner
setTimeout(() => {
  main.insertAdjacentHTML('beforeend', `
    <div class="sponsor-banner" id="sponsor">
      <p>❤️ <strong>Like DevToolbox?</strong> Support indie developers building free tools.</p>
      <a href="https://github.com/sponsors" target="_blank">Sponsor on GitHub →</a>
    </div>
  `);
}, 2000);
</script>
</body>
</html>
